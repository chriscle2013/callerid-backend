<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="admin/layout :: head"></head>
<body>
    <div th:replace="admin/layout :: body"></div>
    
    <div th:fragment="content">
    <div class="row">
        <!-- Card Usuarios -->
        <div class="col-md-4 mb-4">
            <div class="card bg-dark text-white border-primary shadow">
                <div class="card-body">
                    <h5>Total Usuarios</h5>
                    <h2 class="display-5" th:text="${totalUsers}">0</h2>
                </div>
            </div>
        </div>
        <!-- Card Reportes de Llamada -->
        <div class="col-md-4 mb-4">
            <div class="card bg-dark text-white border-danger shadow">
                <div class="card-body">
                    <h5>Spam Telefónico</h5>
                    <h2 class="display-5" th:text="${totalReports}">0</h2>
                </div>
            </div>
        </div>
        <!-- Card SMS Fraudulentos -->
        <div class="col-md-4 mb-4">
            <div class="card bg-dark text-white border-warning shadow">
                <div class="card-body">
                    <h5>SMS Fraudulentos</h5>
                    <h2 class="display-5" th:text="${totalSmsSpam}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Feed de Actividad Reciente -->
    <div class="card bg-dark text-white mt-4 shadow">
        <div class="card-header border-secondary">🔥 Últimas Identificaciones en Velo</div>
        <div class="card-body">
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Número Consultado</th>
                        <th>Tipo</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="h : ${recentHistory}">
                        <td th:text="${h.userPhoneNumber}"></td>
                        <td th:text="${h.searchedNumber}"></td>
                        <td>
                            <span th:if="${h.type == 'SMS'}" class="badge bg-info">SMS</span>
                            <span th:if="${h.type != 'SMS'}" class="badge bg-primary">CALL</span>
                        </td>
                        <td th:text="${h.searchDate}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
    </div>
</body>
</html>

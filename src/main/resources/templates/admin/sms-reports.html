<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="admin/layout :: head"></head>
<body style="background-color: #020617;">
    <div th:replace="admin/layout :: body"></div>
    <div th:fragment="content">
        <h3 class="text-white fw-bold mb-4">📥 Buzón de SMS Fraudulentos</h3>
        <div class="card shadow-lg border-0" style="border-radius: 24px; background-color: #0F172A; overflow: hidden;">
            <div class="card-body p-0">
                <table class="table table-dark table-hover align-middle mb-0">
                    <thead style="background-color: #1E293B;">
                        <tr>
                            <th class="ps-4">Remitente</th>
                            <th>Mensaje Detectado</th>
                            <th>Categoría</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sms : ${smsReports}">
                            <td class="ps-4 text-info fw-bold" th:text="${sms.phoneNumber}"></td>
                            <td>
                                <div class="p-2 rounded bg-dark border border-secondary small" 
                                     style="max-width: 400px; color: #E2E8F0;" th:text="${sms.messageBody}"></div>
                            </td>
                            <td><span class="badge bg-danger" th:text="${sms.category}"></span></td>
                            <td>
                                <form th:action="@{/admin/sms-reports/{id}/delete(id=${sms.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

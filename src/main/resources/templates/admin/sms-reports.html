<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="admin/layout :: head"></head>
<body>
    <div th:replace="admin/layout :: body"></div>
    
    <div th:fragment="content">
        <div class="card">
            <div class="card-header bg-white">
                <h6 class="mb-0"><i class="fas fa-sms"></i> Gestión de Reportes SMS Spam</h6>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Remitente</th>
                            <th>Mensaje</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="report : ${smsReports}">
                            <td th:text="${report.id}"></td>
                            <td th:text="${report.senderNumber}"></td>
                            <td th:text="${report.messageContent}"></td>
                            <td>
                                <span class="badge" th:classappend="${report.status == 'APPROVED' ? 'bg-success' : (report.status == 'REJECTED' ? 'bg-danger' : 'bg-warning')}" 
                                      th:text="${report.status}">PENDING</span>
                            </td>
                            <td>
                                <form th:action="@{'/admin/sms-reports/' + ${report.id} + '/status(status=APPROVED)'}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-success"><i class="fas fa-check"></i></button>
                                </form>
                                <form th:action="@{'/admin/sms-reports/' + ${report.id} + '/status(status=REJECTED)'}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger"><i class="fas fa-times"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="admin/layout :: head"></head>
<body>
    <div th:replace="admin/layout :: body"></div>
    
    <div th:fragment="content">
    <h3>📥 Buzón de SMS Sospechosos</h3>
    <div class="card bg-dark text-white shadow">
        <div class="card-body">
            <table class="table table-dark">
                <thead>
                    <tr>
                        <th>Remitente</th>
                        <th>Mensaje Detectado</th>
                        <th>Categoría</th>
                        <th>Reportado por</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${reports}">
                        <td th:text="${s.phoneNumber}" class="text-warning font-weight-bold"></td>
                        <td th:text="${s.messageBody}" style="max-width: 300px; font-size: 0.9em;"></td>
                        <td><span class="badge bg-danger" th:text="${s.category}"></span></td>
                        <td th:text="${s.reportedBy}"></td>
                        <td>
                            <form th:action="@{/admin/sms/delete/{id}(id=${s.id})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="admin/layout :: head"></head>
<body>
    <div th:replace="admin/layout :: body"></div>
    
    <div th:fragment="content">
        <div class="card">
            <div class="card-header bg-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">
                        <i class="fas fa-sms"></i> Reportes de SMS Spam
                    </h6>
                    <span class="badge bg-primary" th:text="${#lists.size(smsReports)} + ' reportes'">0 reportes</span>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Remitente</th>
                                <th>Mensaje</th>
                                <th>Categoría</th>
                                <th>Fecha</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="report : ${smsReports}">
                                <td th:text="${report.id}">1</td>
                                <td><code th:text="${report.phoneNumber}">3001234567</code></td>
                                <td th:text="${report.messageBody}">Contenido del SMS...</td>
                                <td><span class="badge bg-info" th:text="${report.category}">Spam</span></td>
                                <td th:text="${#temporals.format(report.reportDate, 'dd/MM/yyyy HH:mm')}">21/06/2026</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(smsReports)}">
                                <td colspan="5" class="text-center text-muted">
                                    <i class="fas fa-inbox fa-2x d-block mb-2"></i>
                                    No hay reportes de SMS registrados.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="admin/layout :: head"></head>
<body>
    <div th:replace="admin/layout :: body"></div>
    
    <div th:fragment="content">
        <div class="card">
            <div class="card-header bg-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">
                        <i class="fas fa-list"></i> Lista de Usuarios
                    </h6>
                    <span class="badge bg-primary" th:text="${#lists.size(users)} + ' usuarios'">0 usuarios</span>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Número de Teléfono</th>
                                <th>Email</th>
                                <th>Estado</th>
                                <th>Código UUID (Key)</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.userId}">1</td>
                                <td th:text="${user.userName}">Nombre</td>
                                <td><code th:text="${user.phoneNumber}">3001234567</code></td>
                                <td th:text="${user.email}">email@ejemplo.com</td>
                                <td>
                                    <span class="badge bg-success">Registrado</span>
                                </td>
                                <td>
                                    <span th:if="${user.uuid != null && !user.uuid.isEmpty()}" 
                                          style="background-color: #eef2ff; color: #4f46e5; font-family: monospace; font-size: 0.85rem; padding: 4px 8px; border-radius: 6px; border: 1px solid #e0e7ff; font-weight: bold; display: inline-block;"
                                          th:text="${user.uuid}">A1B2C3</span>
                                    <span th:if="${user.uuid == null || user.uuid.isEmpty()}" class="badge bg-danger text-white">
                                        <i class="fas fa-exclamation-triangle"></i> SIN UUID
                                    </span>
                                </td>
                                <td>
                                    <form th:action="@{'/admin/numbers/' + ${user.userId} + '/mark-spam'}" method="post" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-warning" 
                                                onclick="return confirm('¿Estás seguro de marcar este usuario como SPAM?')">
                                            <i class="fas fa-flag"></i> Marcar Spam
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="7" class="text-center text-muted">
                                    <i class="fas fa-inbox fa-2x d-block mb-2"></i>
                                    No hay usuarios registrados aún
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="admin/layout :: head"></head>
<body>
    <div th:replace="admin/layout :: body"></div>
    
    <div th:fragment="content">
        <div class="card">
            <div class="card-header bg-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="fas fa-list"></i> Lista de Usuarios</h6>
                    <span class="badge bg-primary" th:text="${#lists.size(users)} + ' usuarios'">0 usuarios</span>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Teléfono</th>
                                <th>Email</th>
                                <th>UUID</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.userId}">1</td>
                                <td th:text="${user.userName}">Nombre</td>
                                <td><code th:text="${user.phoneNumber}">3001234567</code></td>
                                <td th:text="${user.email}">email@ejemplo.com</td>
                                <td><span th:text="${user.uuid}">A1B2C3</span></td>
                                <td>
                                    <span th:if="${user.spammer}" class="badge bg-danger">SPAM</span>
                                    <span th:if="${!user.spammer}" class="badge bg-success">Normal</span>
                                </td>
                                <td>
                                    <form th:action="@{'/admin/numbers/' + ${user.userId} + '/toggle-spam'}" method="post">
                                        <button type="submit" class="btn btn-sm btn-warning">
                                            <i class="fas fa-flag"></i> Toggle Spam
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

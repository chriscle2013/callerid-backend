<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="admin/layout :: head"></head>
<body>
    <div th:replace="admin/layout :: body"></div>
    
    <div th:fragment="content">
        <div class="card shadow-lg border-0" style="border-radius: 20px; background-color: #0F172A; color: white;">
            <div class="card-header bg-transparent border-secondary py-3">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <i class="fas fa-shield-alt text-primary"></i> Moderación de Comunidad Velo
                    </h5>
                    <span class="badge rounded-pill bg-primary px-3" th:text="${#lists.size(users)} + ' Miembros'">0 Miembros</span>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead class="text-secondary small text-uppercase">
                            <tr>
                                <th>Usuario</th>
                                <th>Contacto</th>
                                <th>Seguridad (Key)</th>
                                <th class="text-center">Acciones Premium</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="avatar-circle me-3" 
                                             style="width: 40px; height: 40px; background: #1E293B; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                                            <i class="fas fa-user text-info"></i>
                                        </div>
                                        <div>
                                            <div class="fw-bold" th:text="${user.userName}">Nombre</div>
                                            <small class="text-muted" th:text="${user.email}">email@ejemplo.com</small>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge bg-secondary font-monospace" th:text="${user.phoneNumber}">300123...</span>
                                </td>
                                <td>
                                    <code class="small p-1 px-2 rounded" 
                                          style="background: #1E293B; color: #60A5FA; border: 1px solid #334155;"
                                          th:text="${user.uuid != null ? user.uuid : 'SIN LLAVE'}">A1B2C3</code>
                                </td>
                                <td>
                                    <div class="d-flex justify-content-center gap-2">
                                        <!-- Botón Verificar -->
                                        <form th:action="@{/admin/user/{id}/verify(id=${user.userId})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-info" title="Verificar Usuario">
                                                <i class="fas fa-check-shield"></i> Verificar
                                            </button>
                                        </form>
                                        
                                        <!-- Botón Marcar Spam -->
                                        <form th:action="@{/admin/user/{id}/mark-spam(id=${user.userId})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-danger" 
                                                    onclick="return confirm('¿Seguro que deseas marcar este número como SPAMMER GLOBAL?')">
                                                <i class="fas fa-ban"></i> Banear
                                            </button>
                                        </form>

                                        <!-- Botón Fix UUID -->
                                        <a th:href="@{/admin/fix-uuid/{num}(num=${user.phoneNumber})}" 
                                           class="btn btn-sm btn-outline-warning" target="_blank">
                                            <i class="fas fa-key"></i> Fix
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="admin/layout :: head"></head>
<body>
    <div th:replace="admin/layout :: body"></div>
    
    <div th:fragment="content">
        <div class="card">
            <div class="card-header bg-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="fas fa-list"></i> Lista de Usuarios</h6>
                    <span class="badge bg-primary" th:text="${#lists.size(users)} + ' usuarios'"></span>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Número</th>
                                <th>Estado SPAM</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.userId}"></td>
                                <td th:text="${user.userName}"></td>
                                <td><code th:text="${user.phoneNumber}"></code></td>
                                <td>
                                    <span th:if="${user.spammer}" class="badge bg-danger">🚨 SPAM</span>
                                    <span th:unless="${user.spammer}" class="badge bg-success">✅ Seguro</span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/numbers/{id}/toggle-spam(id=${user.userId})}" method="post" style="display: inline;">
                                        <button type="submit" class="btn btn-sm" 
                                                th:classappend="${user.spammer} ? 'btn-success' : 'btn-warning'">
                                            <i class="fas" th:classappend="${user.spammer} ? 'fa-check' : 'fa-flag'"></i>
                                            <span th:text="${user.spammer} ? 'Marcar como seguro' : 'Marcar como spam'"></span>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
